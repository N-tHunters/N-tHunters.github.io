<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8"/>
    <title>N-tHunters</title>
    <link href="style.css" type="text/css" rel="stylesheet"/>
    <link href="BinaryCats-Logo.png"  rel="shortcut icon"/>
  </head>
  <body>
    <div class="background">
    </div>
    <h1 class="header">
      ~/N-tHunters
    </h1>
  </body>
  <script>
    var texts = [
	'Hello everybody here! We are a group of creative students with endless motivation to improve our skills and build interesting projects. Also we take part in various CTF events as Mendicant Order team'
    ];

    for(var word of texts[0].split(' ')) {
	var new_element = document.createElement('div');
	new_element.className = 'not-block para animated';
	new_element.innerHTML = word;
	document.body.append(new_element);
    }
  </script>
  <script src="./codegen.js"></script>
  <script src="./dragable.js"></script>
  <script>
    var background = document.getElementsByClassName('background')[0];

    background.innerHTML = generate_background();

    Array.from(document.getElementsByClassName('animated')).forEach(element => animateElement(element));
    makeAnimatedDragable();
    Array.from(document.getElementsByClassName('dragable')).forEach(element => dragElement(element));

    window.onload = function() {
	setInterval(animate, 1);
    }
  </script>
</html>
